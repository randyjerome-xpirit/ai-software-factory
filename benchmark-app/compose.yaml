services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: benchmark_uploads
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d benchmark_uploads"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    environment:
      AZURITE_ACCOUNTS: benchmark:YmVuY2htYXJrLWJsb2Itc3RvcmFnZS1rZXktMDEyMzQ1Njc4OTA=
    command: azurite-blob --location /data --skipApiVersionCheck --blobHost 0.0.0.0 --blobPort 10000
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

volumes:
  postgres-data:
  azurite-data: